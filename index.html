function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function progressView(){
  var totalDone = Object.values(done).filter(Boolean).length;
  var overall = pct();
  var rows = MODULES.map(function(m){
    var dc = m.lessons.filter(function(l){return done[l.id];}).length;
    var p = Math.round(dc/m.lessons.length*100);
    return {name:m.name, icon:m.icon, dc:dc, total:m.lessons.length, p:p, first:m.lessons[0].id};
  });
  var weak = rows.slice().sort(function(a,b){return a.p-b.p;})[0];
  var next = flat.find(function(x){return !done[x.l.id];});
  var h='<div class="crumb">Your progress</div><h2 class="lt">📊 Progress &amp; Next Steps</h2>';
  h+='<div class="prog-hero"><div class="prog-big">'+overall+'%</div><div class="prog-meta"><div class="prog-count">'+totalDone+' of '+flat.length+' lessons complete</div>';
  if(next){ h+='<div class="prog-next">Pick up where you left off: '+lchip(next.l.id)+'</div>'; }
  else { h+='<div class="prog-next">🎉 Every lesson complete — revisit the Eval Lab and ship a Build Log artifact.</div>'; }
  h+='</div></div>';
  h+='<h3 class="sec-h">By track</h3>';
  h+='<div class="masonry m-card">';
  rows.forEach(function(r){
    h+='<div class="trackrow" onclick="showLesson(\''+r.first+'\')"><div class="tr-top"><span class="tr-name">'+r.icon+' '+r.name+'</span><span class="tr-c">'+r.dc+'/'+r.total+'</span></div>'+
       '<div class="skbar"><span class="skfill" style="width:'+r.p+'%"></span></div></div>';
  });
  h+='</div>';
  if(weak && weak.p<100){ h+='<div class="weakbox"><b>Focus area:</b> '+weak.icon+' '+weak.name+' is your least-complete track ('+weak.p+'%). '+(weak.p===0?'A strong place to start.':'Finish it to round out your foundation.')+'</div>'; }
  document.getElementById('view').innerHTML=h;
  window.scrollTo(0,0);
}

function showLesson(id){
  tab='learn'; syncTabs();
  const idx = flat.findIndex(x=>x.l.id===id);
  if(idx<0){ homeView(); return; }
  const m = flat[idx].m, l = flat[idx].l;
  const scn = (l.scenarios||[]).map(s=>'<div class="scn-item"><b>'+s.title+'</b><br>'+s.body+'</div>').join('');
  const applied = (l.applyPM||[]).map(x=>'<li>'+x+'</li>').join('');
  const refs = (l.refs||[]).map(refChip).filter(Boolean).join('');
  const rel = (m.related||[]).slice(0,6).map(r=>'<a href="'+r.l+'" target="_blank" rel="noopener">'+(r.a||'post')+' — '+r.snip+' ↗</a>').join('');
  const prev = idx>0?flat[idx-1]:null, next = idx<flat.length-1?flat[idx+1]:null;
  const kpiSection = !l.kpis ? '' : '<div class="kpi-wrap"><h3 class="kpi-title">Business impact — 20 KPIs to prove AI value</h3><p class="kpi-intro">'+(l.kpisIntro||'')+'</p>'+
    l.kpis.map(function(g){ return '<div class="kpi-group"><h4 style="color:'+g.color+'"><span class="kpi-dot" style="background:'+g.color+'"></span>'+g.cat+'</h4><div class="kpi-grid">'+
      g.items.map(function(k){ return '<div class="kpi-card" style="border-top-color:'+g.color+'"><div class="kpi-h"><span class="kpi-n" style="background:'+g.color+'">'+k.n+'</span><span class="kpi-name">'+k.name+'</span></div><div class="kpi-f">'+k.f+'</div><div class="kpi-note">'+k.note+'</div></div>'; }).join('')+
      '</div></div>'; }).join('')+
    '<p class="kpi-credit">Framework: “20 Ways to Measure AI Impact” — Clare Kitching.</p></div>';
  document.getElementById('view').innerHTML =
    '<div class="crumb">'+m.icon+' '+m.name+'</div><h2 class="lt">'+l.title+'</h2>'+
    '<div class="masonry m-lesson">'+
    '<div class="block"><h3>What it is</h3><div>'+l.what+'</div></div>'+
    '<div class="block"><h3>How to understand it</h3><div>'+l.understand+'</div></div>'+
    '<div class="block apply"><h3>How to apply it as a PM</h3><ul>'+applied+'</ul></div>'+
    (scn?'<div class="block scn"><h3>Real-world scenarios</h3>'+scn+'</div>':'')+
    '<div class="block ex"><h3>Practice exercise</h3><div>'+l.exercise+'</div></div>'+
    (refs?'<div class="block ref"><h3>Go deeper — references</h3><div class="related">'+refs+'</div></div>':'')+
    (rel?'<div class="block"><h3>Related reading</h3><div class="related">'+rel+'</div></div>':'')+
    '</div>'+
    kpiSection+
    '<label class="mark"><input type="checkbox" id="markDone" '+(done[l.id]?'checked':'')+'> Mark this lesson complete</label>'+
    '<div class="navrow">'+
      (prev?'<button class="btn" onclick="showLesson(\''+prev.l.id+'\')">← '+prev.l.title+'</button>':'<button class="btn" onclick="homeView()">← Home</button>')+
      (next?'<button class="btn primary" onclick="showLesson(\''+next.l.id+'\')">'+next.l.title+' →</button>':'<button class="btn primary" onclick="setTab(\'refs\')">See all references →</button>')+
    '</div>';
  document.getElementById('markDone').onchange = e=>{ done[l.id]=e.target.checked; save(); updateBar(); buildNav(document.getElementById('search').value.toLowerCase()); markActive(id); };
  markActive(id);
  window.scrollTo(0,0);
}
function markActive(id){ document.querySelectorAll('.lessons li').forEach(li=>li.classList.toggle('active', li.dataset.id===id)); }

document.getElementById('search').addEventListener('input', e=>buildNav(e.target.value.toLowerCase()));
buildNav(''); updateBar(); homeView();
</script>

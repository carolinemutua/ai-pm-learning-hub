<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caroline's PM &amp; AI Learning Hub</title>
<style>
  :root{--bg:#0b1220;--panel:#111a2e;--ink:#eaf0fc;--muted:#93a0bd;--accent:#4c8dff;--accent2:#7c5cff;--line:#243149;--ok:#31c48d;}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.65 'Segoe UI',system-ui,sans-serif;display:flex;min-height:100vh}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  aside{width:340px;flex:0 0 340px;background:var(--panel);border-right:1px solid var(--line);height:100vh;position:sticky;top:0;overflow-y:auto;padding:20px 16px}
  aside h1{font-size:18px;margin:0 0 2px}
  aside .sub{color:var(--muted);font-size:12px;margin:0 0 14px}
  .search{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--line);background:#0c1424;color:var(--ink);margin-bottom:12px;font-size:13px}
  .navtabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
  .navtabs button{background:#0c1424;border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 6px;font-size:12.5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .navtabs button.active{background:#13233f;color:#fff;border-color:var(--accent)}
  .mod{margin-bottom:6px}
  .mod-h{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13.5px}
  .mod-h:hover{background:#0c1424}
  .mod-h .c{margin-left:auto;color:var(--muted);font-size:11px;font-weight:500}
  .lessons{list-style:none;margin:0 0 6px;padding:0 0 0 30px}
  .lessons li{padding:6px 8px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .lessons li:hover{background:#0c1424;color:var(--ink)}
  .lessons li.active{background:#13233f;color:#fff}
  .lessons li .dot{width:8px;height:8px;border-radius:50%;border:1.5px solid var(--muted);flex:0 0 8px}
  .lessons li.done .dot{background:var(--ok);border-color:var(--ok)}
  main{flex:1;width:100%;max-width:none;margin:0;padding:30px 5% 90px}
  .progress-wrap{position:sticky;top:0;background:linear-gradient(var(--bg),var(--bg) 72%,transparent);padding:8px 0 14px;z-index:5}
  .bar{height:8px;background:#0c1424;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0}
  .bar-label{color:var(--muted);font-size:12px;margin-top:6px}
  .crumb{color:var(--muted);font-size:12.5px;margin:6px 0 2px}
  h2.lt{font-size:27px;margin:4px 0 18px;line-height:1.25}
  #view>p{max-width:80ch}
  .masonry{column-gap:16px}
  .masonry>*{break-inside:avoid}
  .m-lesson{column-width:470px}
  .m-card{column-width:390px}
  /* Peer-card grid: one card per cell, row-major, equal columns, tops aligned (no height-balancing stacking) */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;align-items:start}
  .cardgrid>*{margin-bottom:0!important;break-inside:auto}
  @media(max-width:720px){.cardgrid{grid-template-columns:1fr}}
  .block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:0 0 16px}
  .block h3{margin:0 0 8px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent)}
  .block.apply h3{color:#5ad2a0}.block.scn h3{color:#e0b34c}.block.ex h3{color:var(--accent2)}.block.ref h3{color:#63b3ff}
  .block ul{margin:6px 0 0;padding-left:20px}.block li{margin:6px 0}
  .scn-item{border-left:3px solid #e0b34c55;padding:4px 0 4px 12px;margin:12px 0}
  .scn-item b{color:#f0c96b}
  .kpi-wrap{margin-top:24px;border-top:2px solid var(--line);padding-top:20px}
  .kpi-title{font-size:19px;margin:0 0 4px;color:var(--ink)}
  .kpi-intro{color:var(--muted);max-width:82ch;margin:0 0 18px}
  .kpi-group{margin:0 0 20px}
  .kpi-group h4{display:flex;align-items:center;gap:8px;font-size:13px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .kpi-dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
  .kpi-grid{column-width:290px;column-gap:14px}
  .kpi-card{break-inside:avoid;margin:0 0 14px;background:var(--panel);border:1px solid var(--line);border-top:3px solid;border-radius:10px;padding:12px 14px}
  .kpi-h{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .kpi-n{flex:0 0 22px;width:22px;height:22px;border-radius:50%;color:#08101f;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
  .kpi-name{font-weight:650;font-size:13.5px;line-height:1.25;color:var(--ink)}
  .kpi-f{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;background:#0c1424;border:1px dashed var(--line);border-radius:6px;padding:7px 9px;margin-bottom:7px;color:#cfe0ff}
  .kpi-note{font-size:12px;color:var(--muted);line-height:1.4}
  .kpi-credit{color:var(--muted);font-size:11.5px;font-style:italic;margin:2px 0 0}
  .reflist{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
  .reflist li{padding:12px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px}
  .reflist li:hover{border-color:var(--accent)}
  .reflist .ra{color:#9fc0ff;font-weight:600}.reflist .rn{color:var(--muted);font-size:12px;display:block;margin-top:4px;line-height:1.45}
  .badge{font-size:10.5px;padding:1px 6px;border-radius:10px;border:1px solid var(--line);color:var(--muted);margin-left:6px}
  .badge.free{color:#5ad2a0;border-color:#2c6b4f}.badge.paid{color:#e0b34c;border-color:#6b5a2c}
  .related{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .related a{background:#0c1424;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--muted);max-width:280px}
  .related a:hover{border-color:var(--accent);color:var(--ink);text-decoration:none}
  .navrow{display:flex;justify-content:space-between;margin-top:22px;gap:10px}
  .btn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 16px;cursor:pointer;font-size:13.5px}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));border:none}
  .mark{display:inline-flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer;color:var(--muted);font-size:13.5px}
  .mark input{accent-color:var(--ok);width:16px;height:16px}
  .home-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:18px}
  .home-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;cursor:pointer}
  .home-card:hover{border-color:var(--accent)}
  .home-card .ic{font-size:26px}.home-card h4{margin:8px 0 4px;font-size:15px}.home-card p{color:var(--muted);font-size:12.5px;margin:0}
  .ref-group{margin-bottom:26px}
  .ref-group h3{font-size:15px;margin:0 0 12px;color:#fff;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .vid-sub{color:var(--muted);font-size:12.5px;margin:0 0 14px;line-height:1.5}
  .vid-topic{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:#ff7a8a;margin:16px 0 8px}
  .vidlist li{border-left:3px solid #ff4d67}.vidlist .ra{color:#ffb3c0}
  .skills-panel{background:linear-gradient(180deg,#121a30,#0e1526);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin:0 0 24px}
  .sk-h h3{margin:0 0 4px;font-size:19px}
  .sk-h .sk-sub{margin:0 0 14px;color:var(--muted);font-size:12.5px;line-height:1.5}
  .skillrow{padding:12px 0;border-top:1px solid var(--line)}
  .skillrow:first-of-type{border-top:none;padding-top:2px}
  .skmeta{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .skname{font-weight:600;font-size:14.5px}
  .skpct{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .skpct::after{content:"/100"}
  .skbar{height:8px;background:#0b1220;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin:6px 0 8px}
  .skfill{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px}
  .sksrc{font-size:11.5px;color:var(--muted);margin:0 0 4px}.sksrc b{color:#9fc0ff;font-weight:600}
  .skwhy{font-size:12.5px;color:#cdd8f0;line-height:1.5;margin:0 0 8px}
  .roles-sub{margin:6px 0 14px;font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .sec-h{margin:22px 0 12px;font-size:16px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  /* Progress tab */
  .prog-hero{display:flex;align-items:center;gap:20px;background:linear-gradient(180deg,#121a30,#0e1526);border:1px solid var(--line);border-radius:14px;padding:22px;margin:0 0 8px}
  .prog-big{font-size:44px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .prog-meta{font-size:14px}.prog-count{color:var(--ink);font-weight:600;margin-bottom:6px}
  .prog-next{color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .trackrow{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin:0 0 10px;cursor:pointer}
  .trackrow:hover{border-color:var(--accent)}
  .tr-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
  .tr-name{font-weight:600;font-size:14px}.tr-c{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .weakbox{border-left:3px solid var(--accent2);background:#150f26;border-radius:0 8px 8px 0;padding:12px 16px;margin:14px 0;font-size:13.5px}
  .weakbox b{color:#b79cff}
  /* Build Log */
  .build-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:0 0 16px}
  .bl-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .bl-top h3{margin:0;font-size:17px}
  .bl-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-radius:20px;padding:3px 11px;white-space:nowrap}
  .bl-status.idea{background:#1c2435;color:#93a0bd;border:1px solid var(--line)}
  .bl-status.building{background:#2a2410;color:#e6c34a;border:1px solid #5c4f19}
  .bl-status.shipped{background:#0e2a1e;color:#5ad2a0;border:1px solid #1f6b4c}
  .bl-skills{font-size:12px;color:#9fc0ff;margin:8px 0 2px;font-weight:600}
  .bl-why{border-left:3px solid var(--accent2);background:#150f26;border-radius:0 8px 8px 0;padding:9px 13px;margin:10px 0;font-size:12.5px;color:#cdd8f0}.bl-why b{color:#b79cff}
  .bl-meta{font-size:12px;color:var(--muted);margin:8px 0}.bl-meta b{color:#9fc0ff}
  .bl-links{display:flex;gap:8px;margin:10px 0 0}
  .bl-learned{border-top:1px solid var(--line);margin-top:12px;padding-top:10px;font-size:12.5px;color:#cdd8f0}
  /* Eval Lab */
  .lab-task{border-left:3px solid var(--accent);background:#0e1a26;border-radius:0 8px 8px 0;padding:11px 15px;margin:6px 0 18px;font-size:13.5px}
  .lab-step{display:flex;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin:0 0 12px}
  .ls-n{flex:0 0 auto;width:30px;height:30px;border-radius:50%;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:14px}
  .ls-body{flex:1}.ls-body h4{margin:2px 0 6px;font-size:15px}.ls-body p{margin:0 0 10px;font-size:13px;color:#cdd8f0;line-height:1.55}
  pre.code{background:#0a1020;border:1px solid var(--line);border-radius:10px;padding:16px;overflow-x:auto;font-size:12px;line-height:1.5;color:#cde0ff;white-space:pre;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  ul.pitfalls{margin:0;padding-left:20px;column-width:360px;column-gap:26px}ul.pitfalls li{margin:7px 0;font-size:13px;color:#cdd8f0;break-inside:avoid}
  .uc-grid{column-width:360px;column-gap:16px}
  .uc-card{break-inside:avoid;margin:0 0 16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
  .uc-head{display:flex;align-items:center;gap:11px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
  .uc-ic{font-size:22px;flex:0 0 auto}
  .uc-hh h4{margin:0;font-size:14.5px;line-height:1.25}
  .uc-pat{font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:.04em}
  .uc-row{margin:8px 0}
  .uc-lbl{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:#8ea6d6;font-weight:700;margin-bottom:2px}
  .uc-row p{margin:0;font-size:12.5px;color:#cdd8f0;line-height:1.5}
  .uc-watch{border-left:3px solid #e0985a;background:#1a140d;border-radius:0 7px 7px 0;padding:7px 11px}
  .uc-watch .uc-lbl{color:#f0b477}
  /* Interview bank */
  .qgroup{margin:0 0 22px}.qgroup>h3{font-size:16px;margin:0 0 12px;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 18px;margin:0 0 12px}
  .qcard .q{font-weight:600;font-size:14.5px;margin-bottom:8px}
  .qcard .crib{font-size:12.5px;color:#cdd8f0;line-height:1.55;margin-bottom:9px}.qcard .crib b{color:#5ad2a0}
  /* Teardowns */
  .td-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:0 0 16px}
  .td-sec{margin:12px 0}.td-sec p{margin:4px 0 0;font-size:13px;color:#cdd8f0;line-height:1.55}
  .td-sec ul{margin:4px 0 0;padding-left:18px}.td-sec li{margin:5px 0;font-size:13px;color:#cdd8f0;line-height:1.5}
  .td-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#8ea6d6;font-weight:700}
  .td-interview{border-left:3px solid var(--ok);background:#0e1a16;border-radius:0 8px 8px 0;padding:10px 14px}
  .td-interview .td-lbl{color:#5ad2a0}
  .td-evals{border-left:3px solid #4ab0c4;background:#0b1a20;border-radius:0 8px 8px 0;padding:10px 14px}
  .td-evals .td-lbl{color:#57c6dc}
  .td-evals p strong{color:#bfe8f2;font-weight:650}
  .role-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin:0 0 20px}
  .role-card .rtop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
  .role-card h3{margin:0;font-size:19px}
  .role-card .co{color:var(--muted);font-size:13px;margin:2px 0 0}
  .role-card .open{white-space:nowrap;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border-radius:8px;padding:7px 13px;font-size:12.5px}
  .role-card .open:hover{text-decoration:none;opacity:.9}
  .rtags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px}
  .rtag{font-size:11px;color:#9fc0ff;border:1px solid var(--line);border-radius:10px;padding:1px 9px}
  .rfit{border-left:3px solid var(--ok);background:#0e1a16;border-radius:0 8px 8px 0;padding:10px 14px;margin:12px 0;font-size:13.5px}
  .rfit b{color:#5ad2a0}
  .rsum{color:var(--muted);font-size:13.5px;margin:8px 0 4px}
  .req{border-top:1px solid var(--line);padding:12px 0 4px}
  .req .need{font-weight:600;font-size:14px}
  .req .why{color:var(--muted);font-size:12.5px;margin:3px 0 8px}
  .lchips{display:flex;flex-wrap:wrap;gap:7px}
  .lchip{background:#0c1424;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px;color:#cdd8f0;cursor:pointer}
  .lchip:hover{border-color:var(--accent);color:#fff;text-decoration:none}
  .rprep{background:#181226;border:1px solid #33285a;border-radius:10px;padding:12px 16px;margin-top:14px}
  .rprep h4{margin:0 0 6px;font-size:12.5px;text-transform:uppercase;letter-spacing:.04em;color:#b79cff}
  .rprep ul{margin:0;padding-left:18px}.rprep li{margin:5px 0;font-size:13px}
  .book-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:0;margin:0 0 14px;overflow:hidden}
  .book-card.expanded{border-color:var(--accent)}
  .bhead{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;flex-wrap:wrap}
  .bhead:hover{background:#0e1729}
  .bchev{color:var(--accent);font-size:15px;transition:transform .15s;flex:0 0 auto}
  .book-card.expanded .bchev{transform:rotate(90deg)}
  .bhinfo{flex:1 1 auto;min-width:0}
  .bcount{flex:0 0 auto;font-size:11px;color:#9fc0ff;border:1px solid var(--line);border-radius:10px;padding:2px 9px}
  .bbody{display:none;padding:0 22px 18px;max-width:90ch}
  .bbody.show{display:block}
  .book-card h3{margin:0;font-size:18px}
  .book-card .co{color:var(--muted);font-size:13px;margin:2px 0 0}
  .book-card .open{white-space:nowrap;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border-radius:8px;padding:7px 13px;font-size:12.5px;flex:0 0 auto}
  .book-card .open:hover{text-decoration:none;opacity:.9}
  .bmeta{color:var(--muted);font-size:12px;margin:6px 0 0}
  .bstatus{display:inline-block;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;border-radius:9px;padding:1px 8px;margin-left:8px;vertical-align:middle}
  .bstatus.published{background:#0e1a16;color:#5ad2a0;border:1px solid #1c4d3a}
  .bstatus.early{background:#241a0e;color:#e0a23c;border:1px solid #4d3a1c}
  .bblurb{color:var(--muted);font-size:13.5px;margin:12px 0 4px}
  .chap{border-top:1px solid var(--line);padding:14px 0 6px}
  .chap .cn{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:6px;background:#0c1424;border:1px solid var(--line);color:#9fc0ff;font-size:12px;font-weight:600;margin-right:8px}
  .chap .ct{font-weight:600;font-size:14.5px}
  .chap .cobj{color:var(--ink);font-size:13px;margin:8px 0}
  .chap .clab{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#b79cff;margin:10px 0 3px}
  .chap ul.ctake{margin:0;padding-left:18px}.chap ul.ctake li{margin:4px 0;font-size:13px}
  .chap .cex{background:#181226;border:1px solid #33285a;border-radius:8px;padding:9px 13px;margin:10px 0;font-size:13px}
  .chap .cex b{color:#b79cff}
  .hide{display:none}
  @media(max-width:820px){aside{display:none}main{padding:20px 4%}}
</style></head>
<body>
<aside>
  <h1>PM &amp; AI Learning Hub</h1>
  <p class="sub">23 lessons · curated AI PM curriculum · 14/07/2026, 17:15:19</p>
  <input class="search" id="search" placeholder="Search lessons…">
  <div class="navtabs">
    <button id="tabLearn" class="active" onclick="setTab('learn')">Lessons</button>
    <button id="tabRoles" onclick="setTab('roles')">🎯 Skills</button>
    <button id="tabBuild" onclick="setTab('build')">🛠️ Build Log</button>
    <button id="tabEvalLab" onclick="setTab('evallab')">🧪 Eval Lab</button>
    <button id="tabInterview" onclick="setTab('interview')">🎤 Interview</button>
    <button id="tabTeardowns" onclick="setTab('teardowns')">🔍 Teardowns</button>
    <button id="tabBooks" onclick="setTab('books')">📖 Books</button>
    <button id="tabProgress" onclick="setTab('progress')">📊 Progress</button>
    <button id="tabRefs" onclick="setTab('refs')">📚 References</button>
  </div>
  <nav id="nav"></nav>
</aside>

<script>
const PAYLOAD = {"modules":[{"id":"ai-pm","icon":"🧩","name":"AI Product Management","blurb":"The fastest-growing PM specialty. Decide where AI adds real value and ship products that prove it.","linkKw":["ai pm","ai product","ai-first","genai product","llm product"],"refs":["aakash_aipm","aakash_aipm_guide","marily_home","lenny_home","ms_ai_hub"],"lessons":[{"id":"aipm-role","title":"What an AI PM actually does","what":"An AI Product Manager owns products whose core value comes from machine intelligence — an LLM, a recommender, a vision model — rather than deterministic rules. The definition worth memorising, distilled from your saves: <em>\"An AI PM's job is not to build intelligence. It is to decide <b>where</b> intelligence adds real value, then design, ship, and measure a product that proves it.\"</em> You are still a PM (problems, users, outcomes) but you add three permanent questions: is AI the right tool here, how do we handle it being wrong, and how do we know it's good enough.","understand":"A classic PM designs a machine where every lever gives a predictable result. An AI PM designs a machine with a <strong>probabilistic engine</strong> at its heart: the same input can give different outputs, quality varies by case, and the system can <em>improve with data</em>. That last property is the superpower and the trap — it creates a <strong>data flywheel</strong> (usage → data → better model → more usage) but also means your product is never \"finished\". Mental model: you are less an architect of fixed blueprints and more a <strong>gardener</strong> shaping a living system with guardrails, feedback, and measurement. The classic failure is \"AI-first thinking\" — starting from \"let's use AI\" instead of a job worth doing. AI is the means; the job-to-be-done is the end.","applyPM":["Start from a frequent, valuable user problem — then ask if intelligence is the best tool, or if plain rules win.","Judge ideas on value-add × cost-of-error: high value + recoverable errors = a strong AI use case.","Design the data flywheel explicitly: what data does usage generate, and how does it feed back into quality?","Decide the quality bar and how you will measure it BEFORE building, not after.","Own three things classic PMs don't: evaluation, failure handling, and model/vendor cost trade-offs."],"scenarios":[{"title":"Spotify — Discover Weekly","body":"The job is \"help me find music I'll love without effort\". AI fits perfectly: taste is fuzzy and pattern-based, and a wrong track is cheap (you just skip). Spotify's data flywheel — every skip/save trains the next recommendation — is the AI PM's real product, not the playlist UI. Notice they never promise perfection; they promise pleasant discovery."},{"title":"Google Photos — search \"beach 2019\"","body":"Value-add is huge (find one photo in 40,000); cost of a wrong match is trivial (you scroll past it). That asymmetry is exactly what makes it a great AI feature. A PM who understood \"high value, low error-cost, fuzzy task\" greenlit it; the same PM would reject AI for the app's billing math, where rules must be exact."}],"exercise":"Pick a consumer app you love. Write one sentence: \"AI adds value here by ___, and when it's wrong the cost is ___.\" If the error sentence is scary and unmitigated, it isn't yet a good AI feature — redesign it until the wrong answer is cheap or recoverable.","refs":["aakash_aipm_guide","marily_home","lenny_home"]},{"id":"aipm-what-to-build","title":"Deciding WHAT AI feature to build","what":"The most common AI PM interview question in your saves: <em>\"How would you decide what AI feature to build?\"</em> ~90% of candidates fail by instantly pitching a feature. The evaluated skill is a repeatable <strong>decision framework</strong>, not a clever idea.","understand":"Strong AI-feature decisions sit at the intersection of three tests. <strong>1) User value</strong> — is the pain real, frequent, and worth money or time? <strong>2) AI fit</strong> — is the task fuzzy, language-based, or pattern-heavy (AI wins) versus exact-rule (plain code wins)? <strong>3) Feasibility & risk</strong> — do we have data, and is the cost of a wrong answer tolerable? A useful sharpener is the <strong>reversibility test</strong>: prefer features where a wrong output is a suggestion the user can ignore over ones that take irreversible action. Another: the <strong>\"would a smart intern struggle?\"</strong> heuristic — if a human needs judgement/context, AI is plausibly a fit; if a lookup table suffices, don't use a model. Common mistakes: choosing the flashiest idea, ignoring error-cost, and having no data to prove it works.","applyPM":["Score candidates on frequency × value × error-tolerance; the winner is rarely the flashiest.","Reject low-AI-fit ideas fast — never use a model where an if-statement is simpler and safer.","Prefer recoverable output shapes: draft, suggestion, ranked list, autocomplete — not silent auto-action.","Before committing, answer \"what data proves this works, and what does good look like?\"","In interviews: framework first → specific pick → how you'd measure it. Never lead with the feature."],"scenarios":[{"title":"Gmail — Smart Compose vs auto-send","body":"Google shipped Smart Compose (suggests the rest of your sentence) but not \"auto-send replies\". Same underlying model, opposite decisions — because suggesting is reversible (hit Tab or ignore) while auto-sending is irreversible and high-stakes. That single design choice is the whole lesson about error-cost."},{"title":"Netflix — AI picks the thumbnail","body":"Netflix uses ML to choose which artwork you see for a title. Great AI fit (personalised, fuzzy, pattern-based) and near-zero error cost (a poor thumbnail just means a scroll). A weak PM would pitch \"AI that writes the movie\"; a strong one finds the high-frequency, low-risk lever like thumbnails."}],"exercise":"Give a 5-minute spoken answer to \"What AI feature would you build for Duolingo?\" Structure it: (1) top 3 jobs users hire Duolingo for, (2) score each on AI-fit and error-cost, (3) pick one, (4) how you'd measure quality. Record yourself — structure under pressure is a trained skill.","refs":["aakash_aipm","a16z_consumer","lenny_home"]},{"id":"aipm-probabilistic","title":"Designing for a system that is sometimes wrong","what":"Traditional software is deterministic; AI is probabilistic and <strong>will</strong> be wrong some fraction of the time. Your product design — not an apology — must make that safe, using <strong>evals</strong>, <strong>guardrails</strong>, <strong>confidence-aware UX</strong>, and <strong>human-in-the-loop</strong>.","understand":"Four tools convert \"sometimes wrong\" from a bug into managed risk. An <strong>eval</strong> is a graded test set (like unit tests, but scored 0–1 for quality) that lets you measure and prevent regressions. A <strong>guardrail</strong> constrains what the system may output or do (content filters, allowed-actions, schema validation). <strong>Confidence-aware UX</strong> changes the interaction by certainty — show a confident answer directly, hedge or ask when unsure. <strong>Human-in-the-loop</strong> keeps a person on irreversible/high-stakes actions. The governing idea: match the <strong>interaction pattern to the stakes</strong> — <em>suggest</em> for low stakes, <em>confirm</em> for medium, <em>auto-act</em> only when reversible and high-confidence. Design the failure state as carefully as the happy path; users forgive a wrong suggestion but not a wrong irreversible action.","applyPM":["Build the eval set early: 20–100 real examples with expected \"good\" outputs; grade every change against it.","Choose the interaction by stakes: suggest / confirm / auto-act — and write it into the spec.","Instrument feedback (thumbs, edits, overrides) so bad cases flow back into the eval set.","Write acceptance criteria as a quality threshold (\"≥90% of summaries rated useful\"), not a binary pass/fail.","Always give an escape hatch: \"see source\", \"undo\", \"edit before send\"."],"scenarios":[{"title":"ChatGPT — regenerate & citations","body":"OpenAI designs for wrongness: you can regenerate, edit, or ignore any answer, and newer versions cite sources so you can verify. None of the output is irreversible. That UX is why a model that's wrong some percent of the time is still a beloved product — the failure state is cheap."},{"title":"Tesla Autopilot — hands-on nagging","body":"A high-stakes, low-error-tolerance domain, so the design forces human-in-the-loop: it nags you to keep hands on the wheel and disengages when unsure. Contrast with Spotify, where being wrong is free. Same \"AI is sometimes wrong\" reality, opposite safety design — dictated by error-cost."},{"title":"APAD knowledge agent — guardrails over apologies","body":"For an agent quoted by government Protected Area Directors, \"sometimes wrong\" is a high-stakes failure, so the brief bakes the safety design in: it may answer only from uploaded sources, must cite the document every time, and must explicitly refuse when the corpus has no answer instead of guessing. Those three rules — source-grounding, mandatory citation, honest refusal — are the product's failure-state design. Notice the pattern is identical to Tesla's, just tuned to a different risk: match the guardrail to what a wrong answer would cost."}],"exercise":"For one AI feature, write its eval: 5 example inputs and what a \"good\" output looks like for each. Then classify the feature's stakes (low/med/high) and pick suggest/confirm/auto-act. If you can't define \"good\", you can't ship responsibly.","refs":["anthropic_agents","ms_rai"]},{"id":"aipm-prototype","title":"Ship prototypes, not just PRDs","what":"A loud theme across your saves: modern AI PMs don't only write PRDs — they <strong>build</strong>. One Senior AI PM at Google had 484 GitHub contributions in a year. New-age PMs ship prototypes, evals, and frameworks, and increasingly their <strong>GitHub is the new resume</strong>.","understand":"LLMs plus tools like Copilot, Claude Code, v0, and Cursor have collapsed the cost of prototyping. You no longer need an eng sprint to test whether a prompt-driven idea is any good. A working prototype is the highest-bandwidth spec there is: \"here's the behaviour I want\" beats three pages of prose and de-risks the build before engineers invest. This doesn't make you an engineer — it makes you a PM who can <strong>test the riskiest assumption yourself</strong>, usually the model/prompt quality, not the UI. The compounding benefit: each artifact (an eval harness, a prompt library, a demo) becomes portfolio proof of how you think — which your saves say now beats CV bullet points for AI PM roles.","applyPM":["Prototype the riskiest assumption first (usually prompt/model quality), not the pretty UI.","Use a working prototype as the spec — demonstrate the behaviour instead of describing it.","Learn just enough tooling (a notebook, a prompt playground, Copilot/Claude) to test ideas solo.","Keep a public \"build\" portfolio; publishing a small eval or prompt repo signals real AI-PM credibility."],"scenarios":[{"title":"Notion AI — dogfood the prompt","body":"Before committing eng, a PM can mock Notion-AI-style \"summarise this doc\" or \"improve writing\" features in an afternoon with an LLM API and a few example docs. The prototype reveals whether output quality is good enough — the real risk — long before design polish matters."},{"title":"Your own first artifact","body":"Instead of a CV bullet \"familiar with GenAI\", publish a tiny repo: a prompt that turns messy notes into a structured summary, plus 5 test cases showing it works. That is exactly the \"show, don't claim\" proof the AI PM job-market posts in your saves keep demanding."}],"exercise":"This week, build one tiny thing: a single prompt that reliably solves a real micro-task for a consumer app you use (e.g., \"turn a recipe into a shopping list\"). Save it with 3 test cases in a repo or notebook — that's portfolio artifact #1.","refs":["peter_yang","cagan_btl","dlai_courses"]},{"id":"aipm-measure","title":"Measuring AI product success","what":"Classic metrics (adoption, retention, task completion) still apply, but AI products add two layers: <strong>quality</strong> (is the output actually good?) and <strong>trust</strong> (do users believe it enough to act?). Miss these and a technically accurate product still dies.","understand":"Measure three layers together. <strong>Model quality</strong>: eval scores, accuracy, hallucination/error rate, groundedness. <strong>Product engagement</strong>: usage, task completion, time saved, retention. <strong>Trust & acceptance</strong>: how often users accept the AI's suggestion, the edit/override rate, thumbs-down rate, and abandonment. The most under-used AI metric is <strong>acceptance/edit rate</strong> — a rising edit rate is an early warning that quality slipped even when adoption looks flat. Always pair a quality metric with a business metric: accuracy only matters if it moves completion or retention. Beware <strong>vanity + Goodhart</strong>: \"messages sent to the AI\" can rise while satisfaction falls (people re-asking because answers are bad).","applyPM":["Pick one metric per layer (quality / engagement / trust) for every AI feature.","Treat acceptance rate (or edit/override rate) as your north-star trust signal.","Put a regression alarm on eval scores whenever you change prompt, model, or data.","Pair each quality metric with the business outcome it should move; if it moves none, drop it."],"scenarios":[{"title":"GitHub Copilot — acceptance rate","body":"Copilot's headline metric is the share of suggestions developers actually accept (and keep) — a direct trust-and-quality signal, later tied to \"time saved\". If acceptance drops after a model change, that's a quality regression the raw usage count would hide."},{"title":"Spotify AI DJ — skips as feedback","body":"For AI DJ, skip rate and session length are the honest quality signals. A \"wow\" demo means nothing if listeners skip every third track. The skip is both the trust metric and the training feedback — the metric and the flywheel are the same event."}],"exercise":"For an AI feature you'd build, define one metric in each layer: model quality, engagement, and trust. Then name the single event that would most quickly warn you quality is slipping (often edit or skip rate).","kpisIntro":"A fourth, higher tier sits above the three above. Evals (see \"AI evals\") ask \"is the output good?\"; these ask \"is the business better off?\" — the ROI conversation you have with execs, finance, and sponsors, not the quality check you run on every model change. A senior AI PM reports both. 20 board-ready KPIs, grouped by value area, each with its formula.","kpis":[{"cat":"Financial","color":"#2bb6c4","items":[{"n":1,"name":"Revenue Uplift from AI","f":"Post-AI Revenue − Baseline Revenue","note":"Extra revenue created by AI above baseline."},{"n":2,"name":"Cost Savings Realised","f":"(Baseline Cost − Post-AI Cost) − AI Operating Cost","note":"Net cost savings after AI operating costs."},{"n":3,"name":"AI Investment Payback Period","f":"Total AI Investment ÷ Monthly Net Benefit from AI","note":"Time until AI benefits repay the investment."},{"n":4,"name":"AI Benefit-Cost Ratio","f":"Verified AI Benefits ÷ Total AI Costs","note":"Return generated per dollar invested in AI."},{"n":5,"name":"Cost per AI-Assisted Transaction","f":"Total AI Operating Cost ÷ AI-Assisted Transactions","note":"Unit cost of each AI-supported transaction."}]},{"cat":"Operational","color":"#ff7a45","items":[{"n":6,"name":"Cycle Time Reduction","f":"Baseline Cycle Time − Post-AI Cycle Time","note":"How much faster a process runs after AI."},{"n":7,"name":"Straight-Through Processing Value","f":"Auto-Processed Transactions × Manual Cost per Transaction","note":"Value of work completed without manual handoff."},{"n":8,"name":"Labour Capacity Released","f":"Hours Saved × Avg Fully Loaded Hourly Cost","note":"Dollar value of human hours freed by AI."}]},{"cat":"Customer","color":"#4d9bff","items":[{"n":9,"name":"Sales Conversion Uplift","f":"Post-AI Conversion Rate − Baseline Conversion Rate","note":"Lift in prospects converting after AI."},{"n":10,"name":"Customer Retention Uplift","f":"Post-AI Retention Rate − Baseline Retention Rate","note":"Lift in customers staying after AI."},{"n":11,"name":"Customer Satisfaction Uplift","f":"Post-AI CSAT − Baseline CSAT","note":"Improvement in customer satisfaction after AI."},{"n":12,"name":"First Contact Resolution Uplift","f":"Post-AI FCR Rate − Baseline FCR Rate","note":"Lift in issues resolved on first contact."},{"n":13,"name":"Collection Efficiency Improvement","f":"Post-AI Collection Rate − Baseline Collection Rate","note":"Lift in cash collection rate after AI."}]},{"cat":"Scaling","color":"#35c97d","items":[{"n":14,"name":"Time to Value","f":"First Value Date − Project Start Date","note":"How quickly AI delivers measurable benefit."},{"n":15,"name":"Pilot-to-Production Value Rate","f":"Production AI Use Cases with Value ÷ Total AI Pilots × 100","note":"Share of pilots that scale with proven value."},{"n":16,"name":"AI Use Case Value Coverage","f":"Value Pools Covered by AI ÷ Total Priority Value Pools × 100","note":"Share of priority value pools covered by AI."}]},{"cat":"Workforce","color":"#ff6b6b","items":[{"n":17,"name":"Employee Experience Uplift","f":"Post-AI eNPS − Baseline eNPS","note":"Improvement in employee experience."}]},{"cat":"Adoption","color":"#f5b73d","items":[{"n":18,"name":"Adoption Rate","f":"Active AI Users ÷ Total Eligible Users × 100","note":"Share of eligible workforce using AI tools."},{"n":19,"name":"Business Unit Engagement Rate","f":"Business Units Active in AI ÷ Total Business Units × 100","note":"Share of business units active in AI programs."},{"n":20,"name":"AI Literacy Score","f":"Sum of Assessment Scores ÷ Number Assessed","note":"Workforce AI knowledge via standardised assessment."}]}],"refs":["aakash_home","lenny_home"]},{"id":"aipm-evals","title":"AI evals: the PM's test suite for quality","what":"An <strong>eval</strong> (evaluation) is a graded test set for an AI feature: a collection of real inputs, a definition of what a \"good\" output looks like, and a way to score how close the model gets. It is the single most important discipline that separates AI PMs who ship reliable products from those who ship demos. If deterministic software has unit tests, probabilistic AI has evals — and as the PM, <strong>you own them</strong>, because \"good\" is a product judgement, not an engineering one.","understand":"Because an AI feature is right only <em>some</em> percent of the time, you cannot eyeball one nice result and call it done — you need a repeatable measurement of quality across many cases. That is an eval. It has three parts: a <strong>dataset</strong> (20–200 representative inputs, including the hard and embarrassing ones), a <strong>definition of \"good\"</strong> per input (the expected answer, or a rubric like \"cites a real source, no PII, answers the actual question\"), and a <strong>grader</strong> that scores each output. Graders come in three flavours: <strong>code/exact-match</strong> (cheap and objective — did the JSON parse? is the number right?), <strong>human</strong> (gold standard for taste and nuance, but slow and expensive), and <strong>LLM-as-judge</strong> (a second model scores the first against your rubric — scalable, and good enough for many subjective tasks once you've validated it against human scores). Two axes matter: <strong>offline evals</strong> run before you ship (regression testing — did this prompt/model change make things better or worse?) and <strong>online evals</strong> run in production (real user signals like acceptance rate, thumbs-down, edits, escalations). The mindset shift: an eval is not a one-time QA gate, it is a <strong>living asset</strong> — every real failure a user hits should flow back in as a new test case, so the same bug can never silently return. The trap to avoid is <strong>\"vibes-based\" shipping</strong>: changing a prompt because the new output \"feels better\" on one example, with no scored evidence it didn't regress ten others.","applyPM":["Build the eval set on day one, before writing the feature — if you can't define \"good\", you can't ship responsibly.","Curate the dataset from REAL usage and edge cases, not happy-path examples you invented; include the embarrassing failures.","Choose the cheapest grader that's trustworthy: code for objective checks, LLM-as-judge for scalable subjective scoring, humans to calibrate the judge.","Gate every prompt/model/data change behind the offline eval — no change ships if the score drops.","Close the loop: pipe every production failure (thumbs-down, override, escalation) back into the eval set as a new case.","Report a single quality score over time the way you report DAU — make regressions visible to the whole team.","Remember evals ≠ ROI: an eval score proves the output is good, not that the business improved — pair it with the business-impact KPIs in \"Measuring AI product success\" so you can show it moved revenue, cost, or retention."],"scenarios":[{"title":"Duolingo Max — grading the \"Explain My Answer\" bot","body":"When Duolingo added GPT-powered explanations of why your Spanish answer was wrong, \"correct\" isn't a single string — a good explanation must be accurate, in the right language level, and encouraging. The PM's eval is a rubric-scored set: dozens of real wrong answers, each with a rubric (\"names the actual grammar rule? beginner-friendly tone? no hallucinated rule?\"). An LLM-as-judge scores hundreds of variants overnight, so when they swap models to cut cost, they can prove quality held — instead of guessing."},{"title":"Spotify AI DJ — online eval as the product","body":"For the AI DJ, the offline eval (does the transition make sense?) matters, but the online eval is the real judge: skip rate and session length on live traffic. A commentary line or track pick that scores fine offline but spikes skips in production is a regression the PM catches only because the online eval is instrumented. Here the eval signal and the training feedback are literally the same event — the skip."},{"title":"ChatGPT search — LLM-as-judge for citations","body":"To trust \"answer with sources\", OpenAI can't hand-check every query. Instead a judge model scores a large test set on \"is the answer supported by the cited page, and is the citation real?\" — catching hallucinated or mismatched citations at scale. Humans grade a small sample to keep the judge honest. That layered grader (cheap judge + human calibration) is the standard pattern you'll design as an AI PM."},{"title":"APAD conservation knowledge agent — grounding & citation evals","body":"A real brief: a knowledge platform for Africa's Protected Area Directors where a RAG agent must answer <em>only</em> from uploaded training reports and best-practice studies, cite the source document in every response, work in English and French, and refuse when no source supports the answer. The eval is what makes those guardrails real, not just words in a spec. You'd build a test set of actual Director questions and grade each answer on four things: <strong>groundedness</strong> (is every claim supported by a retrieved document, zero outside knowledge?), <strong>citation accuracy</strong> (does the cited doc actually contain the claim — the #1 failure mode in grounded agents), <strong>correct refusal</strong> (when the corpus has no answer, does it say so instead of inventing one?), and <strong>bilingual quality</strong> (same fidelity in French as English). Because the whole value proposition is \"trust it in front of governments\", an ungrounded or wrongly-cited answer is a high-stakes failure — so an LLM-as-judge scoring groundedness and citation-match on every corpus or model change is the difference between a credible pilot and an embarrassing one."}],"exercise":"Build a real mini-eval this week. Pick one AI feature you use (e.g. Notion AI \"summarise\", Gmail Smart Reply). (1) Collect 10 real inputs, including 3 tricky/edge cases. (2) Write a one-line rubric for \"good\" (e.g. \"captures the 3 key points, no invented facts, under 40 words\"). (3) Run each input, score 0–1 against your rubric, and compute the average. (4) Now change one thing (a different prompt or a smaller model) and re-score. If you can state \"quality went from 0.7 to 0.8\" instead of \"it feels better\", you've done the core job of an AI PM.","refs":["aakash_aipm_guide","anthropic_agents","ms_rai","openai_prompt"]}],"related":[{"s":3,"a":"Sachin Sharma","snip":"2nd AI Powered PM Coach || Helping Devs, BAs, QA & Analysts Become AI-First Product Managers in 6 Months || 140% Salary Transitions || 1000+ PM Role S","l":"https://www.linkedin.com/feed/update/urn:li:activity:7481959001681723392"},{"s":3,"a":"Sachin Sharma","snip":"2nd AI Powered PM Coach || Helping Devs, BAs, QA & Analysts Become AI-First Product Managers in 6 Months || 140% Salary Transitions || 1000+ PM Role S","l":"https://www.linkedin.com/feed/update/urn:li:activity:7480840667611471872"},{"s":3,"a":"Anjali Sharma","snip":"Apple is hiring an AI Product Manager. Netflix is reportedly paying up to $900k a year for AI PM roles. This isn’t a trend. It’s a role reset. But her","l":"https://www.linkedin.com/feed/update/urn:li:activity:7416063831501623296"},{"s":2,"a":"Beyzanur A. Beyzanur A.","snip":"Found a great *free* resource on the fundamentals of AI PM, as an AI PM 🙃 In one sentence: \"An AI PM's job is not to build intelligence. It is to dec","l":"https://www.linkedin.com/feed/update/urn:li:activity:7482491603949895681"},{"s":2,"a":"Lokesh Gupta","snip":"GitHub profile is becoming the new resume for AI Product Managers. Most PMs think GitHub is only for developers which is not true. If you are targetin","l":"https://www.linkedin.com/feed/update/urn:li:activity:7482450156316094464"},{"s":2,"a":"Lokesh Gupta","snip":"90% of AI Product Manager candidates fail this interview question. Reason - They do not know how to think like an AI PM. One of the most common AI PM ","l":"https://www.linkedin.com/feed/update/urn:li:activity:7481964869286809601"}]},{"id":"product","icon":"🎯","name":"Product Management Foundations","blurb":"The timeless craft that AI does not replace: discovery, prioritisation, strategy, and crisp specs.","linkKw":["product manage","roadmap","prioritiz","user research","jobs-to-be-done","pmf","user story"],"refs":["svpg_articles","cagan_teams","benh_pm","lenny_home","reforge"],"lessons":[{"id":"pm-role","title":"The PM role: value, not authority","what":"A Product Manager owns the <strong>why</strong> and <strong>what</strong> — the problems worth solving and the outcomes to hit — while engineering owns the how and design owns the experience. The defining constraint: PMs usually have <strong>no direct authority</strong> over the people they depend on. You ship through influence, clarity, and evidence.","understand":"Marty Cagan's framing: a product must be <strong>valuable</strong> (users want it), <strong>viable</strong> (the business can sustain it), <strong>usable</strong> (people can figure it out), and <strong>feasible</strong> (engineering can build it). The PM keeps these in tension and makes the call when they conflict. A crucial distinction: <strong>outputs</strong> (features shipped) vs <strong>outcomes</strong> (behaviour/metric changed). Weak PMs count features; strong PMs move outcomes. Another Cagan idea: the difference between a <strong>feature team</strong> (builds what it's told) and an <strong>empowered product team</strong> (is given problems and finds the best solution). Your job is to earn the latter by consistently pairing judgement with evidence.","applyPM":["Frame every initiative as an outcome (metric to move), never just an output (feature to ship).","Say no often — a roadmap is defined more by what you reject than what you accept.","Bring evidence (data, user quotes) to disagreements; it beats opinion and rank.","Balance the four risks (value, viability, usability, feasibility) explicitly in every big call."],"scenarios":[{"title":"Instagram — the pivot from Burbn","body":"Burbn was a cluttered check-in app. The team noticed users only loved one job: sharing photos. Cutting everything else to become Instagram was pure product judgement — choosing the outcome (effortless photo sharing) over the pile of features. That single \"what to remove\" decision made the product."},{"title":"Feature vs outcome","body":"A stakeholder demands \"add a dashboard\" to a consumer fitness app. You reframe: \"what decision should this help the user make?\" They actually need one nudge (\"you're 800 steps from your goal\"), not a dashboard. You solved the outcome and saved a quarter of build."}],"exercise":"Take a feature request from any app you use and rewrite it from an output (\"build X\") into an outcome (\"so users can ___, measured by ___\"). Notice how the outcome framing often changes what you'd actually build.","refs":["benh_pm","cagan_teams","svpg_articles"]},{"id":"pm-discovery","title":"Discovery & Jobs-to-be-Done","what":"Discovery is validating that a problem is real and worth solving <strong>before</strong> you build. Jobs-to-be-Done (JTBD) is the lens: people \"hire\" a product to make progress in a specific situation. The classic line — people don't want a quarter-inch drill, they want a quarter-inch hole.","understand":"JTBD shifts you from demographics (\"women 25–34\") to <strong>situations and motivations</strong> (\"when I move to a new city and feel lonely, help me meet people so I feel I belong\"). Write jobs as: <em>When [situation], I want to [motivation], so I can [expected outcome].</em> The job is stable; your solution is disposable. Great discovery interviews dig into the <strong>struggle</strong> and the <strong>last time</strong> it happened (\"walk me through the last time you…\") rather than asking people to predict the future (\"would you use…?\") — humans are terrible at the latter. Also learn the <strong>four forces</strong> that drive switching: push of the current situation, pull of the new solution, anxiety about the new, and habit of the old. You must overcome anxiety + habit, not just add features.","applyPM":["Interview for the struggle: \"tell me about the last time you did X\" beats \"would you use Y?\".","Write jobs in the When/I want/so I can format; separate the stable job from your changeable solution.","Map the four forces (push, pull, anxiety, habit) before designing the switch.","Validate demand cheaply (fake-door, concierge, prototype) before committing eng."],"scenarios":[{"title":"Airbnb — the real job","body":"Early Airbnb thought the job was \"cheaper hotels\". Interviews revealed a deeper job: \"when I travel, help me feel like I belong somewhere, not like a tourist.\" That reframing drove everything from photography to reviews to \"live like a local\" — none of which \"cheap hotel\" would have inspired."},{"title":"Duolingo — the streak","body":"The functional job is \"learn a language\"; the emotional/social job is \"feel consistent and not guilty\". Duolingo's streaks, reminders, and league mechanics serve the emotional job — which is why they drive retention far more than adding grammar lessons would. Discovery surfaces jobs beyond the obvious functional one."}],"exercise":"Write two JTBD statements for a consumer app you use daily, in the \"When… I want… so I can…\" format — one functional job and one emotional/social job. The emotional job usually explains retention.","refs":["hbr_jtbd","jtbd","intercom_jtbd","cagan_discovery"]},{"id":"pm-prioritization","title":"Prioritisation frameworks","what":"Prioritisation is choosing what to do next when everything feels urgent. Common tools: <strong>RICE</strong> (Reach × Impact × Confidence ÷ Effort), <strong>MoSCoW</strong> (Must/Should/Could/Won't), <strong>Value vs Effort</strong> 2×2, and <strong>Kano</strong> (basic vs performance vs delight needs).","understand":"Frameworks don't make the decision — they make your reasoning <strong>explicit and debatable</strong>. The number matters less than the shared conversation about reach, impact, and confidence. <strong>Confidence</strong> is the most-abused input: be honest when you're guessing, and use a spike or experiment to buy confidence on high-impact/low-confidence bets. <strong>Kano</strong> adds nuance AI PMs need: some features are <em>basics</em> (absence angers, presence is unnoticed), some are <em>performance</em> (more is better), and some are <em>delighters</em> (unexpected joy) — and delighters decay into basics over time (Face ID was magic, now expected). Beware prioritising a pile of delighters while a broken basic quietly churns users.","applyPM":["Use RICE to compare unlike items on one scale; use Value/Effort for a fast first cut.","Timebox scoring — it's a thinking aid, not a spreadsheet trophy.","Attack broken \"basics\" (Kano) before adding \"delighters\"; basics cause churn.","Convert low-confidence, high-impact items into experiments before betting the roadmap."],"scenarios":[{"title":"WhatsApp vs feature bloat","body":"WhatsApp won by nailing the basics — fast, reliable, simple messaging — while rivals piled on delighters (stickers, games) on shaky reliability. Kano thinking says: a rock-solid basic beats a dozen delighters riding on a flaky core. Prioritisation is often \"fix the basic\", not \"add the shiny\"."},{"title":"Two loud stakeholders","body":"Two execs each want their feature first in a consumer app. Instead of politics, you score both with RICE in the open; one has 10× the reach. The framework depersonalises the call and the \"loser\" can see exactly why — turning a power struggle into a data conversation."}],"exercise":"Score three features (real or imagined) for an app you use with RICE. Then classify each with Kano (basic / performance / delighter). Notice when a low-RICE \"basic\" should still jump the queue because it's causing churn.","refs":["reforge","lenny_home"]},{"id":"pm-strategy","title":"Roadmaps & product strategy","what":"Strategy is the <strong>logic for how you'll win</strong>: which users, which problems, in what order, and why now. A roadmap expresses that strategy over time — best as outcomes/themes (now/next/later), not a dated feature list you'll be forced to break.","understand":"A real strategy makes <strong>choices</strong>; if it excludes nothing, it isn't a strategy — it's a wish list. Richard Rumelt's \"good strategy\" has a <strong>diagnosis</strong> (what's really going on), a <strong>guiding policy</strong> (your approach), and <strong>coherent actions</strong> (aligned moves). Fixed feature-date roadmaps break on contact with reality and destroy trust when you \"miss\" them; <strong>outcome-based roadmaps</strong> (\"this quarter: cut time-to-first-value\") stay honest while preserving flexibility. Use <strong>now / next / later</strong> to communicate certainty honestly — precise for now, fuzzy for later. Anchor everything to 2–3 strategic bets, each tied to a measurable outcome, and visibly kill work that serves none of them.","applyPM":["Anchor the roadmap to 2–3 bets, each tied to a measurable outcome.","Communicate as now/next/later instead of hard dates for uncertain work.","State the diagnosis and the trade-off out loud — what you are NOT doing and why.","Visibly defer or kill anything not serving a current bet."],"scenarios":[{"title":"Netflix — streaming over DVDs","body":"Netflix's strategy was a hard choice: cannibalise its profitable DVD business to bet on streaming before rivals. Diagnosis (internet will kill physical media), guiding policy (own streaming), coherent actions (content deals, then originals). Strategy is visible because of what they chose to sacrifice."},{"title":"Now/Next/Later in practice","body":"Leadership wants a 12-month feature list for a consumer app. You give a now/next/later roadmap tied to outcomes (\"Now: reduce onboarding drop-off\"). When priorities shift in month three, you move cards between columns instead of \"missing\" a dated promise — trust intact."}],"exercise":"Draft a now/next/later roadmap for one initiative where each item names the OUTCOME it drives. Then write the one sentence of what you're deliberately NOT doing this cycle — that sentence is your strategy.","refs":["svpg_articles","reforge"]},{"id":"pm-specs","title":"PRDs and user stories that don't suck","what":"A PRD communicates the problem, the intended outcome, and enough solution to build the right thing. A <strong>user story</strong> captures a need from the user's view: \"As a [user], I want [capability], so that [benefit].\" Both exist to create <strong>shared understanding</strong>, not to be exhaustive.","understand":"The best specs lead with the <strong>problem and the why</strong>, then the outcome/metric, then just enough of the how — over-specifying robs engineers of better solutions. Make \"done\" unambiguous with <strong>acceptance criteria</strong> in Given/When/Then form. Keep stories <strong>INVEST</strong>: Independent, Negotiable, Valuable, Estimable, Small, Testable. A story that can't be tested or is too big to estimate is a smell. For AI features, acceptance criteria become <em>quality thresholds and failure behaviours</em> (\"Given a low-confidence result, when shown, then the UI hedges and offers a source\") — you're specifying probabilistic behaviour, not just deterministic clicks.","applyPM":["Open every PRD with the problem, the user, and the metric you'll move.","Write acceptance criteria as testable Given/When/Then statements.","Keep stories INVEST; split anything too big to estimate or test.","For AI, specify the failure behaviour and quality bar, not just the happy path."],"scenarios":[{"title":"The ambiguous \"done\"","body":"A story \"add export\" in a note-taking app ships as CSV; users expected PDF. Acceptance criteria (\"user can export as PDF and CSV; each opens correctly on mobile\") would have made \"done\" unambiguous before a sprint was wasted. Specs earn their keep at the definition of done."},{"title":"Spec an AI behaviour","body":"For \"AI reply suggestions\" in a messaging app, the useful spec isn't \"add AI replies\"; it's: Given an incoming message, when 3 replies are generated, then each ≤ 8 words, none send automatically, and a thumbs-down removes that style. You specified the probabilistic behaviour and the guardrail."}],"exercise":"Rewrite a vague request (\"make search better\" for any app) into one user story with three testable Given/When/Then acceptance criteria. If a criterion can't be tested, rewrite it until it can.","refs":["svpg_articles","lenny_home"]}],"related":[{"s":3,"a":"Malay Krishna","snip":"Product Managers, these prompts can save you 10+ hours of work every week 💯 These prompts will help you: -> Write a PRD in minutes -> Prioritize feat","l":"https://www.linkedin.com/feed/update/urn:li:activity:7425048323473956864"},{"s":3,"a":"Anton Selikhov","snip":"Product Managers are becoming “Product Engineers” AI won’t replace PMs - but it is fundamentally changing the role: For years PMs created leverage thr","l":"https://www.linkedin.com/feed/update/urn:li:activity:7421939768676020225"},{"s":3,"a":"Muhammad Zain ul Abadin","snip":"Product Manager vs. AI Product Manager same foundation, new depth. This visual captures an important shift in how product roles are evolving. At the c","l":"https://www.linkedin.com/feed/update/urn:li:activity:7408742377269637120"},{"s":3,"a":"Status is online Ram Charan Teja K.","snip":"The biggest dilemma for a new PM? Which idea or problem to pick. There’s never a shortage of ideas or problems. But picking the right one to solve? Th","l":"https://www.linkedin.com/feed/update/urn:li:activity:7275884403745083392"},{"s":2,"a":"Sachin Sharma","snip":"2nd AI Powered PM Coach || Helping Devs, BAs, QA & Analysts Become AI-First Product Managers in 6 Months || 140% Salary Transitions || 1000+ PM Role S","l":"https://www.linkedin.com/feed/update/urn:li:activity:7481959001681723392"},{"s":2,"a":"Sumit Kumar Singh","snip":"Product management is being rewritten. The playbook that got most of us here: user stories, sprint rituals, roadmap reviews, prioritisation debates. I","l":"https://www.linkedin.com/feed/update/urn:li:activity:7451951440941498368"}]},{"id":"agentic-ai","icon":"🤖","name":"Agentic AI & LLM Literacy for PMs","blurb":"Enough technical depth to make credible calls: LLMs, RAG, agents, and prompting — no code required.","linkKw":["llm","rag","agent","prompt","copilot","claude code","mcp","vector","embedding"],"refs":["dlai_courses","a16z_canon","a16z_llmarch","anthropic_agents"],"lessons":[{"id":"llm-basics","title":"How LLMs actually work (the PM version)","what":"A Large Language Model predicts the next <strong>token</strong> (a chunk of text, roughly ¾ of a word) given everything before it. All its \"knowledge\" is statistical patterns from training data frozen at a cutoff date; it has no live memory beyond the <strong>context window</strong> you provide in the prompt.","understand":"Two mental models carry you far. <strong>(1) It's a superb autocomplete</strong> — fluent and plausible, which is exactly why it can be <em>confidently wrong</em> (a \"hallucination\" is just a high-probability continuation that happens to be false). <strong>(2) The context window is its only short-term memory</strong> — anything not in the prompt (or retrieved into it) the model doesn't reliably know, including recent events after its training cutoff. Practical consequences PMs must price in: <strong>cost and latency scale with tokens</strong> (long prompts and long outputs cost more and are slower); <strong>bigger models</strong> are smarter but pricier/slower; and <strong>temperature</strong> controls randomness (low = consistent, high = creative). \"Reasoning\" models trade extra time/tokens for better multi-step answers — a cost/quality lever you choose per use case.","applyPM":["When accuracy matters, give the model the facts in-context (see RAG) instead of trusting its memory.","Expect fluent wrongness by design — build verification, don't assume correctness.","Treat tokens as money and milliseconds: shorter prompts/outputs cut cost and latency.","Pick model size and \"reasoning\" per use case — don't default to the biggest."],"scenarios":[{"title":"ChatGPT invents a citation","body":"Ask for sources and a model may produce a real-looking but non-existent reference. It wasn't \"lying\" — it autocompleted a plausible citation pattern. The product fix is grounding it in real documents (RAG) and showing verifiable links, not scolding the prompt."},{"title":"Why the cheap model got dumber","body":"A consumer app swaps to a smaller model to cut cost; answers get terser and miss nuance. That's the size/quality trade-off made visible. A PM who understands tokens and model size frames it as a deliberate cost/quality dial, and A/B tests the trade rather than guessing."}],"exercise":"Explain \"hallucination\" and \"context window\" to a non-technical friend in one sentence each, using the autocomplete and short-term-memory analogies. If you can teach it simply, you understand it.","refs":["ng_ai4e","dlai_courses","a16z_llmarch"]},{"id":"rag","title":"RAG: grounding AI in your data","what":"Retrieval-Augmented Generation (RAG) <strong>retrieves</strong> relevant documents (from a search index or <strong>vector database</strong>) and puts them into the prompt so the model answers from <strong>your</strong> content — private, fresh, and citable — instead of its frozen memory.","understand":"The pipeline: text is turned into <strong>embeddings</strong> (vectors where similar meaning = nearby points); at query time you embed the question, <strong>retrieve</strong> the closest chunks, and hand them to the model to generate a grounded, cited answer. RAG is how you build an assistant over product docs, help centres, or tickets without retraining a model. The make-or-break truth: <strong>retrieval quality is the product</strong> — garbage retrieval yields a confident garbage answer no matter how good the model. So RAG is mostly a <em>search and data</em> problem (chunking, indexing, freshness, permissions) dressed as an AI problem. Newer \"vectorless\"/agentic-retrieval variants exist (seen in your saves) but the core loop is unchanged: <strong>retrieve, then generate, with citations</strong>.","applyPM":["Reach for RAG when answers must reflect private, fresh, or citable knowledge.","Invest in retrieval quality (chunking, indexing, freshness) — it dominates answer quality.","Require citations so users (and you) can verify, and respect source permissions.","Measure \"groundedness\" (did the answer stick to retrieved sources?) as a core quality metric."],"scenarios":[{"title":"Notion Q&A / Glean at work","body":"Ask \"what's our refund policy?\" and a RAG assistant retrieves the actual policy doc and answers with a link — not a guess. Useful and auditable. If it retrieves the wrong doc, the answer is wrong; that's why the team obsesses over search quality, not the model."},{"title":"Spotify \"AI explains this playlist\"","body":"Imagine an assistant that describes why a track is in your Discover Weekly. Grounding it in your actual listening data (retrieved per user) makes it accurate and personal; ungrounded, it would invent plausible-but-false reasons. RAG turns \"sounds smart\" into \"is correct\"."},{"title":"APAD conservation knowledge platform","body":"A real brief: an assistant for Africa's Protected Area Directors that answers only from uploaded training reports and best-practice studies, citing the source doc every time. The hard part isn't the model — it's retrieval: how you chunk long PDF reports, keep the index fresh as new studies land, and make sure a question about \"community governance in Kenya\" pulls the right passage. Get retrieval wrong and you get a confident wrong answer with a real-looking citation. This is why RAG is a search-and-data problem wearing an AI costume."}],"exercise":"Name a body of content a RAG assistant should answer from (a company handbook, a product's help centre, your own notes). Write what a \"good citation\" looks like for it, and one question where a wrong retrieval would be embarrassing.","refs":["pinecone_rag","dlai_courses"]},{"id":"agents","title":"Agents & tools (and MCP)","what":"An <strong>agent</strong> is an LLM that can take <strong>actions</strong> — call tools/APIs, read files, search, run multi-step loops — to accomplish a goal, not just answer. <strong>MCP</strong> (Model Context Protocol) is an open standard for exposing tools and data to agents in a consistent way.","understand":"A plain LLM <em>talks</em>; an agent <em>does</em>: it plans, calls a tool, observes the result, and iterates until done. Anthropic's useful distinction: many \"agent\" use cases are actually fixed <strong>workflows</strong> (predefined steps) and only some need true <strong>agents</strong> (the model decides the path). Prefer the simplest thing that works — workflows are more predictable and cheaper; reserve autonomous agents for genuinely open-ended tasks. As capability rises, so does risk: an agent that can act can act wrongly, so <strong>tool scoping</strong> (least privilege), <strong>human approval on irreversible actions</strong>, and <strong>observability</strong> (a trace of what it did and why) are product requirements, not nice-to-haves. The PM's core design lever is the same as the \"sometimes wrong\" lesson: auto-run only reversible steps; gate the rest behind a human.","applyPM":["Ask \"is this really an agent, or a fixed workflow?\" — choose the simplest that works.","Give agents the narrowest set of tools that accomplishes the job (least privilege).","Gate irreversible actions behind human approval; auto-run only reversible ones.","Require observability — you must be able to see and replay what the agent did."],"scenarios":[{"title":"Consumer travel agent","body":"An AI that plans a trip can autonomously search flights and hotels (reversible, safe) but should require your confirmation before it books and charges your card (irreversible). That single approval gate is the difference between a delightful assistant and a support nightmare."},{"title":"Coding agents (Cursor / Claude Code)","body":"These agents read your repo, plan, edit files, and run tests in a loop — genuinely open-ended, so a true agent fits. But they show diffs for approval and keep everything in version control (undo). Power plus reversibility: exactly the pattern PMs should copy."},{"title":"APAD research agent — many sources, tight scope","body":"The conservation platform's agent doesn't just answer from one folder — it's designed to pull from several external evidence sources (Climate Policy Radar, IATI d-portal, Google Scholar) and synthesise. That's genuinely agentic: decide which source to query, retrieve, and combine. But because it serves government directors, it's deliberately narrow — read-only retrieval, restricted to a small pilot group, no ability to act or publish. It shows the two levers together: give an agent real tools, but scope them to least privilege and keep a human in front of anything consequential."}],"exercise":"Design an agent for a consumer task you'd love (e.g., \"plan my week\", \"reply to routine emails\"). List its tools and mark each \"auto\" (reversible) or \"needs approval\" (irreversible). The line you draw is the product's safety design.","refs":["anthropic_agents","mcp_docs"]},{"id":"prompting","title":"Prompt engineering for PMs","what":"Prompt engineering is crafting the instructions and context that steer an LLM toward reliable output. For a PM it's a <strong>product design</strong> skill: the system prompt is part of your product's behaviour and deserves versioning and testing, just like code.","understand":"Reliable prompts usually include five parts: a clear <strong>role</strong> (\"You are a support analyst\"), a specific <strong>task</strong>, the <strong>context/data</strong> to use, the required <strong>output format</strong>, and one or two <strong>examples</strong> (few-shot). Specificity beats cleverness; models imitate patterns, so showing a good example often works better than describing it. Techniques worth knowing: <strong>few-shot</strong> (give examples), <strong>chain-of-thought</strong> (\"think step by step\" for reasoning tasks), and <strong>structured output</strong> (ask for JSON so downstream code can rely on it). Small wording changes can swing quality a lot — which is precisely why you <strong>eval</strong> prompts against a test set rather than eyeballing one nice result. As a PM you rarely hand-tune every prompt, but you own the behaviour they encode, so treat the system prompt as a spec under version control.","applyPM":["Treat the system prompt as a versioned spec you test against an eval set.","Give examples of good output; models imitate patterns better than they follow descriptions.","Constrain the output format (e.g., JSON/bullets) so downstream code and UI can rely on it.","Change one thing at a time and re-run evals — prompt quality is empirical, not intuitive."],"scenarios":[{"title":"From vague to reliable","body":"\"Summarise this review\" yields inconsistent blobs. \"You are an app-store analyst. Summarise the review below as Sentiment / Top issue / Requested fix, max 3 bullets\" yields consistent, parseable output every time. Same model, wildly different product quality — that gap is prompt engineering."},{"title":"Grammarly-style tone control","body":"A writing app offers \"make it friendlier / more formal\". Under the hood each is a carefully engineered prompt with role, task, and examples of the target tone. The PM owns which tones exist and what \"good\" looks like — and evals each so quality doesn't drift when the model updates."}],"exercise":"Take a task you'd hand an LLM (e.g., \"turn meeting notes into action items\") and write a prompt with all five parts: role, task, context, format, and one example. Then imagine two edge-case inputs that would test whether it holds up.","refs":["openai_prompt","anthropic_prompt","anthropic_tutorial","ms_prompt"]}],"related":[{"s":4,"a":"Brij Kishore Pandey","snip":"𝗩𝗲𝗰𝘁𝗼𝗿𝗹𝗲𝘀𝘀 𝗥𝗔𝗚 𝗶𝘀 𝗾𝘂𝗶𝗲𝘁𝗹𝘆 𝗿𝗲𝘄𝗿𝗶𝘁𝗶𝗻𝗴 𝗵𝗼𝘄 𝘄𝗲 𝗯𝘂𝗶𝗹𝗱 𝗿𝗲𝘁𝗿𝗶𝗲𝘃𝗮𝗹 𝘀𝘆𝘀𝘁𝗲𝗺𝘀. And most people haven't c","l":"https://www.linkedin.com/feed/update/urn:li:activity:7482642404349730816"},{"s":4,"a":"Status is online Aiswarya Venkitesh ⚡️","snip":"2nd Principal Cloud Solution AI Architect @Microsoft | AI, Data and Tech Content Creator | Global Speaker | Worldwide 🌏 Ranked 4th in the World’s Top","l":"https://www.linkedin.com/feed/update/urn:li:activity:7456148337734414336"},{"s":4,"a":"Dastin Adamowski","snip":"𝐘𝐨𝐮 𝐜𝐚𝐧'𝐭 𝐚𝐟𝐟𝐨𝐫𝐝 this type of Product Manager... (Or rather, you can't afford not to hire them). Data shows that AI Product Managers are","l":"https://www.linkedin.com/feed/update/urn:li:activity:7405374158748205056"},{"s":4,"a":"Status is online Ankit Shukla","snip":"Finally, we have a powerful copilot for Product Managers 🚀 Here are 10 ways PMs can leverage Google's Antigravity to build amazing product experience","l":"https://www.linkedin.com/feed/update/urn:li:activity:7396795576991801344"},{"s":4,"a":"Vivek Sajwan","snip":"Just read Uber’s piece on RAG + agents for NL→SQL. The real story isn’t “LLM writes SQL”—it’s the scaffolding that makes it safe, explainable, and fas","l":"https://www.linkedin.com/feed/update/urn:li:activity:7371930624540073984"},{"s":4,"a":"Shambhavi Pandey","snip":"RAG sounds exciting. Until your engineer starts talking embeddings. 🚀 You nod along, but inside you’re thinking: \"I have no idea what any of this mea","l":"https://www.linkedin.com/feed/update/urn:li:activity:7371916695227195392"}]},{"id":"leadership","icon":"🧭","name":"Leadership & Influence","blurb":"Drive outcomes without authority: influence, stakeholders, feedback, and decisions.","linkKw":["leader","influence","stakeholder","team","feedback","mentor","management"],"refs":["lenny_home","svpg_articles"],"lessons":[{"id":"influence","title":"Influence without authority","what":"PMs (and V-Team leads) drive outcomes through people they don't manage. Influence without authority is earning genuine commitment through <strong>trust, clarity, and reciprocity</strong> rather than command — the single most important PM skill your saves keep circling.","understand":"People say yes when three things line up: they <strong>trust</strong> you, they <strong>understand the why</strong>, and they see <strong>what's in it for them</strong>. Cialdini's levers help — reciprocity, social proof, consistency, liking, authority (expertise), and scarcity — but the durable engine is trust built <em>before</em> you need a favour. Distinguish <strong>commitment</strong> (they own it) from <strong>compliance</strong> (they'll do the minimum); framing an ask in terms of the other person's goals converts compliance into commitment. A practical move: make the yes <strong>small, specific, and low-effort</strong> — reduce the activation energy to help you. And remember the \"currencies\" of exchange differ per person (recognition, growth, information, a quiet favour returned) — pay in the currency they value.","applyPM":["Build relationships before you need them — trust is a pre-loaded account you draw on later.","Translate every ask into the other person's goals and language.","Make the yes small and specific; lower the effort required to help.","Pay in the currency they value (recognition, growth, reciprocity), not the one you'd value."],"scenarios":[{"title":"Open-source maintainers","body":"A PM wanting a popular library to adopt their standard can't order anyone. They win by contributing first (reciprocity), showing other respected projects already did it (social proof), and framing adoption as serving the maintainer's own users. Pure influence-without-authority — the OSS world runs on it."},{"title":"Cross-team dependency","body":"You need another team to expose an API. Instead of escalating, you show how it also unblocks their roadmap, bring a half-built proposal (small, specific yes), and credit them publicly. They commit because helping you visibly helps them."}],"exercise":"Pick a real cross-team ask you have. Write one sentence on what the other person GAINS by saying yes, and one way to make their \"yes\" smaller and easier. If you can't name their gain, you're not ready to ask.","refs":["lenny_home"]},{"id":"stakeholders","title":"Stakeholder management","what":"Stakeholder management is proactively aligning the people who can affect — or are affected by — your product, before misalignment becomes conflict. Silence is where surprises and broken trust grow.","understand":"Map stakeholders on <strong>influence × interest</strong>: high/high = <em>manage closely</em>; high influence/low interest = <em>keep satisfied</em>; low influence/high interest = <em>keep informed</em>; low/low = <em>monitor</em>. Different quadrants need different <strong>cadence and framing</strong>: execs want outcomes, risks, and the decision you need from them; engineers want context and constraints; users want honesty about what's changing. A key skill is managing <strong>disagreement in the open</strong> rather than in side-channels, and giving early <strong>heads-up on bad news</strong> — a small pre-warning turns a \"surprise\" into a \"managed risk\" and protects trust. Track commitments and decisions in writing so alignment survives memory and turnover.","applyPM":["Keep a lightweight influence×interest map; revisit it each quarter.","Tailor cadence and message per quadrant — execs get outcomes/risks, engineers get context.","Surface disagreement early and in the open, not in DMs after the fact.","Pre-warn on bad news; a heads-up beats a blindside every time."],"scenarios":[{"title":"The blindsided exec","body":"A launch slips and a VP hears it first in a public review — trust takes a hit that outlasts the slip. A two-line heads-up the week before (\"tracking a risk on the date, here's the plan\") would have converted a surprise into a managed risk. Cadence prevents drama."},{"title":"Consumer redesign backlash","body":"Shipping a redesign to a beloved app risks user revolt (many have happened). Treating power-users as stakeholders — previewing changes, explaining the why, offering a temporary opt-out — turns a revolt into feedback. Users are stakeholders too."}],"exercise":"Draw an influence×interest 2×2 for one initiative and place five stakeholders on it. Decide a cadence and the one thing each most wants to hear. Notice who you've been under-communicating with.","refs":["svpg_articles"]},{"id":"feedback","title":"Leading through feedback & decisions","what":"Feedback grows people and products; decision-making moves them forward. Good feedback is <strong>specific, timely, and kind</strong> — about behaviour and impact, not identity. Good decisions are made at the right <strong>speed</strong> and clearly <strong>owned</strong>.","understand":"For feedback, use <strong>Situation → Behaviour → Impact</strong>: \"In Monday's review (S), the recommendation wasn't sourced (B), so the team lost confidence in it (I).\" SBI keeps it factual and non-defensive; praise the same way (specific beats \"good job\"). For decisions, borrow Amazon's <strong>Type 1 vs Type 2</strong>: Type 1 are irreversible \"one-way doors\" — go slow, gather input; Type 2 are reversible \"two-way doors\" — decide fast and learn. Most decisions are Type 2 and PMs over-deliberate them. Make ownership explicit with something like <strong>RAPID/DACI</strong> (who Drives,
